<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <title>Sound Test</title>
  <style>
    button { touch-action: manipulation; }
    .sound-btn { min-width: 7rem; }
    .flash-ok  { animation: flash-green 0.4s ease-out; }
    .flash-err { animation: flash-red   0.4s ease-out; }
    @keyframes flash-green { 0%{background-color:#198754;color:#fff} 100%{} }
    @keyframes flash-red   { 0%{background-color:#dc3545;color:#fff} 100%{} }
  </style>
</head>

<body class="font-monospace">
  <div class="container-lg py-3">

    <div class="d-flex align-items-center mb-3 gap-3">
      <a href="/" class="btn btn-secondary">&larr; Back</a>
      <h1 class="h3 mb-0">Sound Test</h1>
      <span id="status" class="text-muted small"></span>
    </div>

    <!-- Tone Effects -->
    <div class="card mb-3">
      <div class="card-header fw-bold">Tone Effects</div>
      <div class="card-body d-flex flex-wrap gap-2">
        <button class="btn btn-outline-primary sound-btn" onclick="play(this,'effect','start_signal')">Start Signal</button>
        <button class="btn btn-outline-primary sound-btn" onclick="play(this,'effect','countdown_beeps')">Countdown (2s)</button>
        <button class="btn btn-outline-primary sound-btn" onclick="play(this,'effect','countdown_beeps_3s')">Countdown (3s)</button>
        <button class="btn btn-outline-primary sound-btn" onclick="play(this,'effect','countdown_beeps_end')">Countdown End</button>
      </div>
    </div>

    <!-- Numbers -->
    <div class="card mb-3">
      <div class="card-header fw-bold">Numbers</div>
      <div class="card-body">
        <div class="d-flex flex-wrap gap-2 mb-2">
          {% for n in numbers %}
          <button class="btn btn-outline-secondary sound-btn" onclick="play(this,'number','{{ n }}')">{{ n }}</button>
          {% endfor %}
        </div>
        <hr class="my-2">
        <div class="d-flex flex-wrap gap-2">
          <button class="btn btn-outline-secondary sound-btn" onclick="play(this,'unit','second')">second</button>
          <button class="btn btn-outline-secondary sound-btn" onclick="play(this,'unit','seconds')">seconds</button>
          <button class="btn btn-outline-secondary sound-btn" onclick="play(this,'unit','minute')">minute</button>
          <button class="btn btn-outline-secondary sound-btn" onclick="play(this,'unit','minutes')">minutes</button>
        </div>
      </div>
    </div>

    <!-- Language Phrases -->
    <div class="card mb-3">
      <div class="card-header fw-bold">Language Phrases</div>
      <div class="card-body d-flex flex-wrap gap-2">
        {% for key, label in language_phrases %}
        <button class="btn btn-outline-success sound-btn" onclick="play(this,'language','{{ key }}')" title="{{ key }}">{{ label }}</button>
        {% endfor %}
      </div>
    </div>

    <!-- Task Announcements -->
    <div class="card mb-3">
      <div class="card-header fw-bold">Task Announcements</div>
      <div class="card-body d-flex flex-wrap gap-2">
        {% for key, name in tasks %}
        <button class="btn btn-outline-warning sound-btn" onclick="play(this,'task','{{ key }}')" title="{{ key }}">{{ name }}</button>
        {% endfor %}
      </div>
    </div>

  </div>

  <script>
    async function play(btn, category, key) {
      const status = document.getElementById('status');
      status.textContent = `Playing: ${category} / ${key}`;
      try {
        const resp = await fetch('/play-sound', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ category, key })
        });
        if (resp.ok) {
          btn.classList.remove('flash-err');
          void btn.offsetWidth; // reflow to restart animation
          btn.classList.add('flash-ok');
          btn.addEventListener('animationend', () => btn.classList.remove('flash-ok'), { once: true });
          status.textContent = `OK: ${category} / ${key}`;
        } else {
          const text = await resp.text();
          btn.classList.remove('flash-ok');
          void btn.offsetWidth;
          btn.classList.add('flash-err');
          btn.addEventListener('animationend', () => btn.classList.remove('flash-err'), { once: true });
          status.textContent = `Error ${resp.status}: ${text}`;
        }
      } catch (err) {
        status.textContent = `Network error: ${err}`;
      }
    }
  </script>
</body>

</html>
